info:
  name: 3 - Get Order - run test here
  type: http
  seq: 3

http:
  method: GET
  url: "{{BaseURL}}/orders/{{orderId}}"
  body:
    type: json
    data: |-
      {
        "itemId": 1,
        "quantity": 1
      }
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: before-request
      code: |-
        const response_login = await bru.runRequest("1 - Login");

        if (response_login.status === 200) {
          const user_data = response_login.data;
          bru.setVar("authToken", user_data.accessToken);
          const response_placed_order = await bru.runRequest("Place Order ID 1 - 50")
          if (response_placed_order.status === 200) {
            const order_data = response_placed_order.data;
            bru.setVar("orderId", order_data.orderId);
          }else{
            console.error("Order failed:", response_placed_order.statusText);
          }
        } else {
          console.error("Login failed:", response_login.statusText);
        }
    - type: tests
      code: |-
        test("should return success", function () {
          expect(res.getStatus()).to.equal(200);
        });

        test("should return array of menu", function () {
          const order = res.getBody();
          
          expect(order).to.have.property("orderId");
          expect(order).to.have.property("status");
          expect(order).to.have.property("totalPrice");
          expect(order.totalPrice).to.equal(50);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
