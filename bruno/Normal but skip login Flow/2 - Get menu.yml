info:
  name: 2 - Get menu
  type: http
  seq: 1

http:
  method: GET
  url: "{{BaseURL}}/menu"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return success", function () {
          expect(res.getStatus()).to.equal(200);
        });

        test("should return array of menu", function () {
          const menus = res.getBody();
          
          expect(menus).to.be.an("array");
          expect(menus).to.have.lengthOf(2);
          expect(menus[0]).to.have.property("id");
          expect(menus[0]).to.have.property("name");
          expect(menus[0]).to.have.property("price");
          expect(menus[0]).to.have.property("stock");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
