info:
  name: 3 - Place Order ID 2
  type: http
  seq: 4

http:
  method: POST
  url: "{{BaseURL}}/orders"
  body:
    type: json
    data: |-
      {
        "itemId": 2,
        "quantity": 1
      }
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: before-request
      code: |-
        const response_login = await bru.runRequest("1 - Login");

        if (response_login.status === 200) {
          const data = response_login.data;
          bru.setVar("authToken", data.accessToken);
          
          const response_menu = await bru.runRequest("2 - Get menu");
          if(response_menu.status === 200) {
          const menu_data = response_menu.data;
          bru.setVar("checkPrice",menu_data[1].price)
            
          }else{
            console.error("Get menu failed:", response_menu.statusText);
          }
          
        } else {
          console.error("Login failed:", response_login.statusText);
        }
