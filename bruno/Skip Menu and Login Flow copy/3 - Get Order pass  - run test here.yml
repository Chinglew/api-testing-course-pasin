http:
  method: GET
  url: "{{BaseURL}}/orders/{{orderId}}"
  body:
    type: json
    data: |-
      {
        "itemId": 1,
        "quantity": 1
      }
  auth:
    type: bearer
    token: "{{authToken}}"

runtime:
  scripts:
    - type: before-request
      code: |-
        const response_placed_order = await bru.runRequest("3 - Place Order ID 2")
        if (response_placed_order.status === 200) {
          const order_data = response_placed_order.data;
          bru.setVar("orderId", order_data.orderId);
        }else{
          console.error("Order failed:", response_placed_order.statusText);
        }
    - type: tests
      code: |-
        test("should return success", function () {
          expect(res.getStatus()).to.equal(200);
        });

        test("should return order error correct", function () {
          const order = res.getBody();
          
          expect(order).to.have.property("error");
          expect(order.error).to.equal("Order not found");
        });

